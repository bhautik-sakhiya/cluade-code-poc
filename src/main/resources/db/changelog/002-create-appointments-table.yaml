databaseChangeLog:
  - changeSet:
      id: 002-create-appointments-table
      author: system
      changes:
        - createTable:
            tableName: appointments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: slot_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_appointment_slot
                    references: slots(id)
              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: rejection_reason
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: appointments
            columnNames: patient_id, slot_id
            constraintName: uq_appointment_patient_slot